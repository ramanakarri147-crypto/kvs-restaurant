<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVS - Admin Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hotel-title { font-family: 'Righteous', cursive; font-size: 35px; color: #FFD700; text-shadow: 0px 4px 15px rgba(255, 215, 0, 0.4); margin-bottom: 20px; text-align: center; }
        
        .verify-container { 
            width: 90%; max-width: 400px; 
            background: rgba(20, 20, 20, 0.95); 
            border: 2px solid #FFD700; 
            border-radius: 25px; 
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }

        h2 { color: #FFD700; text-align: center; margin-bottom: 30px; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; color: #FFD700; margin-bottom: 8px; font-size: 14px; }
        
        input { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid #444; background: rgba(255, 255, 255, 0.05); 
            color: white; outline: none; font-size: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        .eye-icon {
            position: absolute; right: 15px; top: 43px;
            color: #888; cursor: pointer; transition: 0.3s;
        }
        .eye-icon:hover { color: #FFD700; }

        .btn { 
            background: #FFD700; color: black; border: none; 
            padding: 14px; border-radius: 12px; font-weight: bold; 
            cursor: pointer; width: 100%; margin-top: 20px; 
            font-size: 16px; transition: 0.3s; 
        }
        .btn:hover { background: #fff; transform: translateY(-2px); }

        .footer-links { text-align: center; margin-top: 20px; }
        .forget-link { color: #888; font-size: 13px; cursor: pointer; text-decoration: none; }
        .forget-link:hover { color: #FFD700; }

        #error-msg {
            color: #ff4444; font-size: 13px; text-align: center;
            margin-top: 15px; display: none; background: rgba(255, 68, 68, 0.1);
            padding: 8px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="hotel-title">KVS RESTAURANT</div>

    <div class="verify-container">
        <h2>Admin Access</h2>
        
        <div class="input-group">
            <label>Email ID</label>
            <input type="email" id="adminEmail" placeholder="మీ ఈమెయిల్ ఇవ్వండి">
        </div>

        <div class="input-group">
            <label>Access Password</label>
            <input type="password" id="adminPass" placeholder="మీ పాస్‌వర్డ్ ఇవ్వండి">
            <i class="fa-solid fa-eye eye-icon" id="toggleIcon" onclick="toggleView()"></i>
        </div>

        <button class="btn" onclick="checkVerification()">VERIFY & PROCEED</button>
        
        <p id="error-msg">వివరాలు తప్పు! మరొకసారి ప్రయత్నించండి.</p>

        <div class="footer-links">
            <span class="forget-link" onclick="handleHelp()">Forgot Password?</span>
        </div>
    </div>

    <script>
        // పాస్‌వర్డ్ చూపించడానికి/దాచడానికి
        function toggleView() {
            const passInput = document.getElementById('adminPass');
            const icon = document.getElementById('toggleIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passInput.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // వెరిఫికేషన్ లాజిక్
        function checkVerification() {
            const email = document.getElementById('adminEmail').value.trim().toLowerCase();
            const pass = document.getElementById('adminPass').value;
            const error = document.getElementById('error-msg');

            // మీ వివరాలు
            const validEmail = "ramanakarri147@gmail.com";
            const validPass = "satya0741";

            if (email === validEmail && pass === validPass) {
                // సక్సెస్ అయితే మీ పాత login.html కి వెళ్తుంది
                window.location.href = 'login.html';
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        }

        function handleHelp() {
            alert("సహాయం కోసం దయచేసి సిస్టమ్ అడ్మిన్‌ను సంప్రదించండి.");
        }
    </script>
</body>
</html>
