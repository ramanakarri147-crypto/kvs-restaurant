<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVS Restaurant - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: 'Poppins', sans-serif; padding-bottom: 150px; }
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .welcome-card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #FFD700; text-align: center; width: 85%; max-width: 350px; }
        .name-input { width: 90%; padding: 12px; margin: 20px 0; border-radius: 10px; border: 1px solid #FFD700; background: #333; color: white; text-align: center; font-size: 16px; outline: none; }
        .header { text-align: center; background: #1a1a1a; padding: 15px 10px; border-bottom: 2px solid #FFD700; position: sticky; top: 0; z-index: 1001; }
        .hotel-name { font-family: 'Righteous', cursive; font-size: 24px; color: #FFD700; }
        .search-box { width: 90%; padding: 8px 15px; border-radius: 20px; border: none; background: #333; color: white; margin-top:10px; }
        .tabs-container { display: flex; overflow-x: auto; gap: 10px; padding: 12px; background: #111; position: sticky; top: 105px; z-index: 1000; border-bottom: 1px solid #333; scrollbar-width: none; }
        .tab-link { background: #222; color: #FFD700; border: 1px solid #FFD700; padding: 6px 15px; border-radius: 20px; text-decoration: none; font-size: 11px; font-weight: bold; white-space: nowrap; }
        
        .category-group { margin: 15px; background: #161616; border-radius: 12px; border: 1px solid #222; overflow: hidden; scroll-margin-top: 170px; }
        .category-header { background: #FFD700; color: #000; padding: 10px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .category-img { width: 100%; height: 200px; object-fit: cover; display: block; background: #222 url('https://via.placeholder.com/400x200?text=KVS+Special') no-repeat center; border-bottom: 2px solid #FFD700; }
        
        .menu-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; align-items: center; }
        .food-info b { display: block; font-size: 15px; }
        .food-info span { color: #FFD700; font-weight: bold; }
        .add-btn { background: #FFD700; color: #000; border: none; padding: 6px 18px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .qty-box { display: flex; align-items: center; gap: 12px; background: #333; padding: 5px 10px; border-radius: 5px; border: 1px solid #FFD700; }
        .qty-btn { background: none; border: none; color: #FFD700; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .cart-wrapper { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; }
        #review-list { background: #1a1a1a; padding: 10px; border-top: 1px solid #333; max-height: 150px; overflow-y: auto; display: none; }
        .review-item { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 10px; color: #bbb; }
        .cart-bar { background: #25d366; color: white; padding: 10px 20px; display: none; justify-content: space-between; align-items: center; border-radius: 20px 20px 0 0; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .card { background: white; color: black; padding: 20px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
        .finish-btn { background: #25D366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 16px; }

        .receipt-container { 
            background: white; 
            color: black; 
            margin: 20px; 
            padding: 20px; 
            border-radius: 2px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-family: 'Courier New', Courier, monospace;
            display: none;
            position: relative;
        }
        .receipt-header { border-bottom: 2px dashed black; padding-bottom: 10px; text-align: center; margin-bottom: 10px; }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .receipt-total { border-top: 2px dashed black; margin-top: 10px; padding-top: 10px; font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; }
        .receipt-footer { text-align: center; font-size: 11px; margin-top: 15px; font-style: italic; border-top: 1px solid #eee; padding-top: 5px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-card">
        <h2 style="color: #FFD700; margin: 0;">KVS RESTAURANT</h2>
        <input type="text" id="custName" class="name-input" placeholder="మీ పేరు ఇవ్వండి...">
        <button onclick="startApp()" class="finish-btn" style="background:#FFD700; color:black;">ENTER MENU</button>
    </div>
</div>

<div id="main-menu" style="display:none;">
    <div class="header">
        <div class="hotel-name">KVS RESTAURANT</div>
        <input type="text" id="search" class="search-box" placeholder="Search for food..." onkeyup="searchFood()">
    </div>
    <div class="tabs-container" id="sector-tabs"></div>
    <div id="food-list"></div>

    <div id="digital-receipt" class="receipt-container"></div>
    
    <div class="cart-wrapper">
        <div id="review-list"></div>
        <div id="cartBar" class="cart-bar">
            <span id="total-val" style="font-weight: bold;">0 Items | ₹0</span>
            <button onclick="showReceipt()" style="background:white; color:#25d366; border:none; padding:10px 18px; border-radius:10px; font-weight:bold;">PLACE ORDER</button>
        </div>
    </div>
</div>

<div id="main-modal" class="modal">
    <div class="card" id="modal-content"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYOgbu7yfwlSps_-32frEedWss1qmRQoM", 
    authDomain: "kvs-project-c60d8.firebaseapp.com",
    projectId: "kvs-project-c60d8",
    storageBucket: "kvs-project-c60d8.appspot.com",
    messagingSenderId: "905673301986",
    appId: "1:905673301986:web:aad1477b1098d7cbf66380",
    measurementId: "G-RX864HXH0J"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let cart = {};
  let customerName = "";
  let dynamicSectors = [];
  let consumedItems = [];
  let totalBillAmount = 0;
  
  // --- HOTEL LOCATION (TUNI) ---
  const HOTEL_LAT = 17.345585; 
  const HOTEL_LON = 82.542439;

  function startApp() {
      customerName = document.getElementById('custName').value.trim();
      if (customerName.length < 2) return alert("దయచేసి మీ పేరు ఇవ్వండి!");
      document.getElementById('welcome-screen').style.display = 'none';
      document.getElementById('main-menu').style.display = 'block';
      fetchData(); 
  }

  function fetchData() {
      onSnapshot(query(collection(db, "categories"), orderBy("timestamp", "asc")), (snapSectors) => {
          dynamicSectors = snapSectors.docs.map(doc => ({ id: doc.data().id, name: doc.data().name, image: doc.data().image }));
          onSnapshot(collection(db, "menu_items"), (snapItems) => {
              const menuData = snapItems.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              renderUI(menuData);
          });
      });
  }

  function renderUI(menuData) {
      let tabHtml = "";
      dynamicSectors.forEach(s => tabHtml += `<a href="#${s.id}" class="tab-link">${s.name}</a>`);
      document.getElementById('sector-tabs').innerHTML = tabHtml;
      let menuHtml = "";
      dynamicSectors.forEach(s => {
          const items = menuData.filter(item => item.cat === s.id);
          if(items.length > 0) {
              let categoryHtml = "";
              let hasVisibleItems = false;
              items.forEach(item => {
                  if (item.status === "hidden") return; 
                  hasVisibleItems = true;
                  categoryHtml += `<div class="menu-item"><div class="food-info"><b>${item.name}</b><span>₹${item.price}</span></div><div id="btn-${item.id}"><button class="add-btn" onclick="addToCart('${item.id}','${item.name}',${item.price})">ADD</button></div></div>`;
              });
              if(hasVisibleItems) {
                  menuHtml += `<div class="category-group" id="${s.id}">`;
                  if(s.image) menuHtml += `<img src="${s.image}" class="category-img" alt="${s.name}" onerror="this.style.display='none'">`;
                  menuHtml += `<div class="category-header">${s.name}</div>`;
                  menuHtml += categoryHtml;
                  menuHtml += `</div>`;
              }
          }
      });
      document.getElementById('food-list').innerHTML = menuHtml || "<p style='text-align:center;'>No items available!</p>";
      updateCart();
  }

  // --- LOCATION CALCULATION LOGIC ---
  function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
  }

  window.addToCart = (id, name, price) => { if (!cart[name]) cart[name] = { id, price, qty: 1 }; else cart[name].qty++; updateCart(); };
  window.changeQty = (name, delta) => { cart[name].qty += delta; if (cart[name].qty <= 0) { delete cart[name]; fetchData(); } updateCart(); };
  
  window.updateCart = () => {
      let count = 0, total = 0, reviewHtml = "";
      for (let name in cart) {
          count += cart[name].qty; total += cart[name].price * cart[name].qty;
          reviewHtml += `<div class="review-item"><span>${name} x ${cart[name].qty}</span><span>₹${cart[name].price * cart[name].qty}</span></div>`;
          const btnArea = document.getElementById(`btn-${cart[name].id}`);
          if(btnArea) btnArea.innerHTML = `<div class="qty-box"><button class="qty-btn" onclick="changeQty('${name}', -1)">-</button><span>${cart[name].qty}</span><button class="qty-btn" onclick="changeQty('${name}', 1)">+</button></div>`;
      }
      document.getElementById('cartBar').style.display = count > 0 ? 'flex' : 'none';
      document.getElementById('review-list').style.display = count > 0 ? 'block' : 'none';
      document.getElementById('review-list').innerHTML = count > 0 ? `<div style="font-size:10px; color:#FFD700; padding:5px 10px;">Selected Items:</div>` + reviewHtml : "";
      document.getElementById('total-val').innerText = `${count} Items | ₹${total}`;
  };

  window.showReceipt = () => {
      let html = `<h3 style="margin:0;">Order Summary</h3><div style="text-align:left; margin:15px 0;">`;
      let total = 0;
      for (let name in cart) {
          let itemTotal = cart[name].price * cart[name].qty; total += itemTotal;
          html += `<div style="display:flex; justify-content:space-between; border-bottom:1px dashed #ccc; padding:8px 0;"><span>${name} x ${cart[name].qty}</span><span>₹${itemTotal}</span></div>`;
      }
      html += `</div><h3>Total: ₹${total}</h3><button class="finish-btn" id="confirmBtn" onclick="verifyLocation()">CONFIRM ORDER</button><button onclick="document.getElementById('main-modal').style.display='none'" style="background:none; border:none; color:gray; margin-top:10px;">Cancel</button>`;
      document.getElementById('modal-content').innerHTML = html;
      document.getElementById('main-modal').style.display = 'flex';
  };

  // --- LOCATION VERIFICATION TRIGGER ---
  window.verifyLocation = () => {
      const btn = document.getElementById('confirmBtn'); 
      btn.innerText = "Checking Location..."; 
      btn.disabled = true;

      if (!navigator.geolocation) {
          alert("మీ ఫోన్ Geolocation సపోర్ట్ చేయడం లేదు!");
          btn.innerText = "CONFIRM ORDER"; btn.disabled = false;
          return;
      }

      navigator.geolocation.getCurrentPosition((pos) => {
          const dist = getDistance(pos.coords.latitude, pos.coords.longitude, HOTEL_LAT, HOTEL_LON);
          if(dist <= 100) {
              submitFinal(); 
          } else { 
              alert("క్షమించండి! మీరు మా రెస్టారెంట్ కి 100KM పరిధిలో లేరు. దూరం: " + dist.toFixed(2) + " KM"); 
              btn.innerText = "CONFIRM ORDER"; btn.disabled = false; 
          }
      }, (err) => { 
          alert("దయచేసి మీ ఫోన్ లో GPS/Location ఆన్ చేసి పర్మిషన్ ఇవ్వండి!"); 
          btn.innerText = "CONFIRM ORDER"; btn.disabled = false; 
      }, { enableHighAccuracy: true });
  };

  window.submitFinal = async () => {
      let itemsSummary = []; let currentOrderTotal = 0;
      for (let name in cart) {
          let p = cart[name].price * cart[name].qty;
          currentOrderTotal += p;
          itemsSummary.push(`${name} (${cart[name].qty})`);
          consumedItems.push({ name: name, qty: cart[name].qty, price: p });
      }
      totalBillAmount += currentOrderTotal;
      const urlParams = new URLSearchParams(window.location.search);
      await addDoc(collection(db, "orders"), {
          customer: customerName, table: urlParams.get('table') || "Counter",
          items: itemsSummary.join(", "), total: currentOrderTotal, status: "Pending", timestamp: serverTimestamp(), time: new Date().toLocaleString('en-IN')
      });
      alert("ఆర్డర్ విజయవంతమైంది! ✅");
      cart = {}; document.getElementById('main-modal').style.display = 'none';
      updateDigitalReceipt();
      fetchData();
  };

  function updateDigitalReceipt() {
      const receipt = document.getElementById('digital-receipt');
      if(consumedItems.length > 0) {
          receipt.style.display = 'block';
          const now = new Date();
          const dateStr = now.toLocaleDateString('en-IN');
          const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          let itemsHtml = consumedItems.map(i => `<div class="receipt-line"><span>${i.name} (x${i.qty})</span><span>₹${i.price}</span></div>`).join('');
          receipt.innerHTML = `
              <div class="receipt-header">
                  <div style="font-weight:bold; font-size:20px;">KVS RESTAURANT</div>
                  <div style="font-size:12px; margin-top:5px;">*** TAX INVOICE ***</div>
              </div>
              <div style="font-size:11px; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                  <div class="receipt-line"><span>DATE: ${dateStr}</span><span>TIME: ${timeStr}</span></div>
                  <div class="receipt-line"><span>CUST: ${customerName}</span></div>
              </div>
              ${itemsHtml}
              <div class="receipt-total"><span>GRAND TOTAL</span><span>₹${totalBillAmount}</span></div>
              <div class="receipt-footer">--- Thank You! Visit Again ---<br><span style="font-size:9px;">Generated at ${timeStr}</span></div>
          `;
          receipt.scrollIntoView({ behavior: 'smooth' });
      }
  }

  window.startApp = startApp;
  window.searchFood = () => {
      let query = document.getElementById('search').value.toLowerCase();
      let groups = document.getElementsByClassName('category-group');
      for (let g of groups) g.style.display = g.innerText.toLowerCase().includes(query) ? "block" : "none";
  };
</script>
</body>
</html>
