<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVS Restaurant - Secure Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hotel-title { font-family: 'Righteous', cursive; font-size: 40px; color: #FFD700; text-shadow: 0px 4px 15px rgba(255, 215, 0, 0.4); margin-bottom: 20px; text-align: center; }
        .main-container { display: flex; width: 95%; max-width: 900px; background: rgba(20, 20, 20, 0.9); border: 2px solid #FFD700; border-radius: 25px; overflow: hidden; }
        .box { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .login-box { border-right: 1px solid rgba(255, 215, 0, 0.2); }
        .reg-box { background: rgba(255, 215, 0, 0.05); }
        h2 { color: #FFD700; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; color: #FFD700; margin-bottom: 5px; font-size: 14px; }
        .pass-wrapper { position: relative; width: 100%; }
        .eye-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #FFD700; font-size: 18px; z-index: 10; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: rgba(255, 255, 255, 0.05); color: white; outline: none; }
        input:focus { border-color: #FFD700; }
        .btn { background: #FFD700; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #fff; }
        .forget-link { color: #888; font-size: 12px; text-align: center; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .login-box { border-right: none; border-bottom: 1px solid rgba(255, 215, 0, 0.2); } }
    </style>
</head>
<body>

    <div class="hotel-title">KVS RUCHULU</div>

    <div class="main-container">
        <div class="box login-box">
            <h2>Owner Login</h2>
            <div class="input-group">
                <label>User Email ID</label>
                <input type="email" id="loginUser" placeholder="మీ ఇమెయిల్ ఇవ్వండి">
            </div>
            <div class="input-group">
                <label>PIN (Password)</label>
                <div class="pass-wrapper">
                    <input type="password" id="loginPass" placeholder="మీ పాస్‌వర్డ్ ఇవ్వండి">
                    <span class="eye-icon" onclick="toggleVisibility('loginPass')">👁️</span>
                </div>
            </div>
            <button class="btn" onclick="handleLogin()">LOGIN</button>
            <span class="forget-link" onclick="handleForget()">Forget PIN?</span>
        </div>

        <div class="box reg-box">
            <h2>Register</h2>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="ఓనర్ పేరు">
            </div>
            <div class="input-group">
                <label>Email ID</label>
                <input type="email" id="regUserID" placeholder="ఉదా: kvs@gmail.com">
            </div>
            <div class="input-group">
                <label>Set PIN (Password)</label>
                <div class="pass-wrapper">
                    <input type="password" id="regPin" placeholder="కనీసం 6 అంకెలు">
                    <span class="eye-icon" onclick="toggleVisibility('regPin')">👁️</span>
                </div>
            </div>
            <button class="btn" style="background: #25D366; color: white;" onclick="handleRegister()">CREATE ACCOUNT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYOgbu7yfwlSps_-32frEedWss1qmRQoM",
            authDomain: "kvs-project-c60d8.firebaseapp.com",
            projectId: "kvs-project-c60d8",
            storageBucket: "kvs-project-c60d8.firebasestorage.app",
            messagingSenderId: "905673301986",
            appId: "1:905673301986:web:aad1477b1098d7cbf663bb"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function toggleVisibility(id) {
            const input = document.getElementById(id);
            input.type = (input.type === "password") ? "text" : "password";
        }

        // --- REGISTER LOGIC ---
        async function handleRegister() {
            const email = document.getElementById('regUserID').value;
            const pin = document.getElementById('regPin').value;
            const name = document.getElementById('regName').value;

            if(!email.includes("@")) {
                alert("దయచేసి సరైన Email ID ఇవ్వండి!");
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, pin);
                await db.collection("owners").doc(userCredential.user.uid).set({
                    ownerName: name,
                    email: email,
                    ownerId: userCredential.user.uid // Storing UID as Owner ID
                });
                alert("అకౌంట్ సక్సెస్‌ఫుల్ గా క్రియేట్ అయ్యింది! ఇప్పుడు లాగిన్ అవ్వండి.");
            } catch (error) {
                alert("తప్పు: " + error.message);
            }
        }

        // --- LOGIN LOGIC ---
        function handleLogin() {
            const email = document.getElementById('loginUser').value;
            const pin = document.getElementById('loginPass').value;

            auth.signInWithEmailAndPassword(email, pin)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    
                    // SAVE OWNER ID LOCALLY
                    localStorage.setItem('ownerId', uid);

                    // UPDATE LOCATION & REDIRECT
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(async (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;

                            await db.collection("owners").doc(uid).set({
                                hotelLocation: { lat: lat, lng: lng },
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });

                            alert("స్వాగతం! మీ హోటల్ లొకేషన్ అప్‌డేట్ అయ్యింది. 📍");
                            window.location.href = 'owner.html'; // Redirect to your Admin page
                        }, (error) => {
                            alert("Location Allow చేస్తేనే దూరం లాక్ సిస్టమ్ పనిచేస్తుంది. కానీ లాగిన్ అవుతున్నారు...");
                            window.location.href = 'owner.html';
                        });
                    } else {
                        window.location.href = 'owner.html';
                    }
                })
                .catch((error) => alert("లాగిన్ వివరాలు తప్పు: " + error.message));
        }

        function handleForget() {
            const email = prompt("మీ రిజిస్టర్డ్ ఇమెయిల్ ఇవ్వండి:");
            if(email) {
                auth.sendPasswordResetEmail(email)
                    .then(() => alert("పాస్‌వర్డ్ రీసెట్ లింక్ ఇమెయిల్ కి పంపాము!"))
                    .catch((error) => alert(error.message));
            }
        }
    </script>
</body>
</html>
