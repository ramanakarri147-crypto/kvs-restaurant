<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVS Restaurant - Secure Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hotel-title { font-family: 'Righteous', cursive; font-size: 40px; color: #FFD700; text-shadow: 0px 4px 15px rgba(255, 215, 0, 0.4); margin-bottom: 20px; text-align: center; }
        .main-container { display: flex; width: 95%; max-width: 900px; background: rgba(20, 20, 20, 0.9); border: 2px solid #FFD700; border-radius: 25px; overflow: hidden; }
        .box { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .login-box { border-right: 1px solid rgba(255, 215, 0, 0.2); }
        .reg-box { background: rgba(255, 215, 0, 0.05); }
        h2 { color: #FFD700; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; color: #FFD700; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: rgba(255, 255, 255, 0.05); color: white; outline: none; }
        input:focus { border-color: #FFD700; }
        .btn { background: #FFD700; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #fff; }
        .forget-link { color: #888; font-size: 12px; text-align: center; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .login-box { border-right: none; border-bottom: 1px solid rgba(255, 215, 0, 0.2); } }
    </style>
</head>
<body>

    <div class="hotel-title">KVS RESTAURANT</div>

    <div class="main-container">
        <div class="box login-box">
            <h2>Owner Login</h2>
            <div class="input-group">
                <label>User ID</label>
                <input type="text" id="loginUser" placeholder="మీ User ID ఇవ్వండి">
            </div>
            <div class="input-group">
                <label>PIN</label>
                <input type="password" id="loginPass" placeholder="మీ పిన్ ఇవ్వండి">
            </div>
            <button class="btn" onclick="handleLogin()">LOGIN</button>
            <span class="forget-link" onclick="handleForget()">Forget PIN?</span>
        </div>

        <div class="box reg-box">
            <h2>Register</h2>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="ఓనర్ పేరు">
            </div>
            <div class="input-group">
                <label>Create User ID</label>
                <input type="text" id="regUserID" placeholder="ఉదా: kvs_owner">
            </div>
            <div class="input-group">
                <label>Set PIN</label>
                <input type="password" id="regPin" maxlength="6" placeholder="పిన్ సెట్ చేయండి">
            </div>
            <button class="btn" style="background: #25D366; color: white;" onclick="handleRegister()">CREATE ACCOUNT</button>
        </div>
    </div>

    <script>
        function handleRegister() {
            const name = document.getElementById('regName').value;
            const userID = document.getElementById('regUserID').value;
            const pin = document.getElementById('regPin').value;

            if(name && userID && pin) {
                const adminData = { 
                    ownerName: name, 
                    uID: userID, 
                    uPIN: pin 
                };
                localStorage.setItem('kvs_admin_account', JSON.stringify(adminData));
                alert("అకౌంట్ సక్సెస్‌ఫుల్ గా క్రియేట్ అయ్యింది! ఇప్పుడు లాగిన్ అవ్వండి.");
            } else {
                alert("దయచేసి అన్ని వివరాలు నింపండి!");
            }
        }

        function handleLogin() {
            const enteredUser = document.getElementById('loginUser').value;
            const enteredPass = document.getElementById('loginPass').value;
            const savedAccount = JSON.parse(localStorage.getItem('kvs_admin_account'));

            if(!savedAccount) {
                alert("అకౌంట్ లేదు! ముందుగా రిజిస్టర్ చేసుకోండి.");
                return;
            }

            if(enteredUser === savedAccount.uID && enteredPass === savedAccount.uPIN) {
                alert("స్వాగతం " + savedAccount.ownerName + "!");
                window.location.href = 'owner.html';
            } else {
                alert("తప్పు User ID లేదా PIN! మరొకసారి ప్రయత్నించండి.");
            }
        }

        function handleForget() {
            const savedAccount = JSON.parse(localStorage.getItem('kvs_admin_account'));
            if(!savedAccount) {
                alert("వివరాలు ఏవీ లేవు!");
                return;
            }
            
            const checkName = prompt("రిజిస్టర్ చేసిన Full Name ఇవ్వండి:");
            if(checkName === savedAccount.ownerName) {
                alert("మీ User ID: " + savedAccount.uID + "\nమీ PIN: " + savedAccount.uPIN);
            } else {
                alert("పేరు మ్యాచ్ అవ్వలేదు!");
            }
        }
    </script>
</body>
</html>
