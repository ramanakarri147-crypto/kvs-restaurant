<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>KVS Admin - Fixed Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Poppins', sans-serif; padding: 15px; }
        .header { text-align: center; border-bottom: 2px solid #FFD700; padding-bottom: 10px; margin-bottom: 10px; position: relative; }
        .hotel-name { font-family: 'Righteous', cursive; font-size: 28px; color: #FFD700; text-transform: uppercase; }
        .settings-btn { position: absolute; right: 0px; top: 5px; font-size: 22px; cursor: pointer; color: #FFD700; border: 1px solid #FFD700; padding: 5px 10px; border-radius: 50%; }
        .search-container { margin: 10px 0; text-align: center; }
        .search-input { width: 95%; padding: 12px; border-radius: 25px; border: 1px solid #FFD700; background: #333; color: white; outline: none; }
        .tabs-sector { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; position: sticky; top: 0; background: #1a1a1a; z-index: 1000; scrollbar-width: none; border-bottom: 1px solid #333; }
        .sector-btn { background: transparent; color: #FFD700; border: 1px solid #FFD700; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: bold; text-decoration: none; }
        
        /* మల్టీ-కార్డ్స్ ఓవర్‌లాప్ అవ్వకుండా ఇక్కడ ఫిక్స్ చేశాను */
        .container { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .container { flex-direction: row; } }
        
        .left-box { flex: 1; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #444; height: auto; }
        .right-box { flex: 2; }
        
        /* లైవ్ ఆర్డర్ కార్డులు ఒకదాని కింద ఒకటి రావడానికి */
        #orderList { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .live-order-card { 
            position: relative !important; 
            background: #282828; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 5px solid #25D366; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: block;
        }

        .category-card { background: #222; padding: 10px; border-radius: 10px; border-left: 5px solid #FFD700; margin-bottom: 20px; }
        .category-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; }
        .update-btn { background: #FFD700; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }
        .view-btn { background: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; }
        
        .bill-fab { position: fixed; bottom: 30px; right: 30px; background: #FFD700; color: #000; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 4000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); } 100% { transform: scale(1); } }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; padding: 15px; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1.5px solid #FFD700; position: relative; }
        
        .dmart-bill { background: white; color: black; padding: 20px; margin-bottom: 20px; font-family: 'Courier New', monospace; border-radius: 2px; box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .dmart-header { text-align: center; border-bottom: 1px dashed black; padding-bottom: 10px; margin-bottom: 10px; }
        .dmart-row { display: flex; justify-content: space-between; font-size: 14px; margin: 5px 0; }
        .dmart-total { border-top: 1px dashed black; padding-top: 8px; margin-top: 10px; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; }
        
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .table-btn { background: #333; color: #FFD700; border: 1px solid #FFD700; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; color: white; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">
    <div class="hotel-name">KVS RESTAURANT - ADMIN</div>
    <div class="settings-btn" onclick="openSettings()">⚙️</div>
</div>

<div class="search-container">
    <input type="text" id="adminSearch" class="search-input" placeholder="మెనూ ఐటమ్ వెతకండి..." onkeyup="adminSearchFood()">
</div>

<div class="bill-fab" onclick="openBillModal()">
    <i class="fas fa-file-invoice-dollar"></i>
</div>

<div id="billModal" class="modal">
    <div class="modal-content">
        <button onclick="closeBillModal()" class="no-print" style="position:absolute; right:15px; top:15px; background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px;">X</button>
        <h2 style="color:#FFD700; text-align:center; margin-bottom:20px;">Customer Bills</h2>
        <div id="customerBillList"></div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <button onclick="closeSettings()" style="float:right; background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px;">X</button>
        <h2 style="color:#FFD700; text-align:center;">Admin Settings</h2>
        <div id="mainOptions">
            <div class="menu-option" onclick="showSectorManager()" style="background:#333; padding:15px; margin:10px 0; border-radius:8px; cursor:pointer; text-align:center; color:#FFD700; border:1px solid #444;">📁 Manage Categories</div>
            <div class="menu-option" onclick="window.showTablesGrid()" style="background:#333; padding:15px; margin:10px 0; border-radius:8px; cursor:pointer; text-align:center; color:#FFD700; border:1px solid #444;">🪑 Table-wise History</div>
            <div class="menu-option" onclick="window.showHistory('all')" style="background:#25D366; color:white; padding:15px; margin:10px 0; border-radius:8px; cursor:pointer; text-align:center;">💰 View Total Sales</div>
            <div class="menu-option" onclick="window.clearAllHistory()" style="background:#ff4444; color:white; padding:15px; margin:10px 0; border-radius:8px; cursor:pointer; text-align:center;">⚠️ Reset History</div>
        </div>
        <div id="sectorManager" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; padding:5px 10px; border-radius:5px;">⬅ Back</button>
            <div id="sectorList" style="margin-top:10px;"></div>
        </div>
        <div id="tablesGrid" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; padding:5px 10px; border-radius:5px;">⬅ Back</button>
            <div class="grid-50" id="gridContainer"></div>
        </div>
        <div id="historyResult" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; padding:5px 10px; border-radius:5px;">⬅ Back</button>
            <div id="historyContent"></div>
        </div>
    </div>
</div>

<div class="tabs-sector" id="tabsContainer"></div>

<div class="container">
    <div class="left-box">
        <h4 style="margin-top:0; color:#FFD700;">Add Menu Item</h4>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Price">
        <select id="categorySelect"></select>
        <button class="update-btn" onclick="updateMenu()">ADD TO MENU</button>
        <a href="index.html" class="view-btn" target="_blank">VIEW CUSTOMER PAGE</a>
        
        <h4 style="color:#25D366; border-top:1px solid #444; padding-top:15px; margin-top:25px;">📥 LIVE ORDERS</h4>
        <div id="orderList"></div>
    </div>
    <div class="right-box" id="menuArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, getDocs, addDoc, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYOgbu7yfwlSps_-32frEedWss1qmRQoM", 
        authDomain: "kvs-project-c60d8.firebaseapp.com",
        projectId: "kvs-project-c60d8",
        storageBucket: "kvs-project-c60d8.appspot.com",
        messagingSenderId: "905673301986",
        appId: "1:905673301986:web:aad1477b1098d7cbf66380"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Snapshot for Customer Bills - Date Fixed Here
    onSnapshot(query(collection(db, "owner_bills"), orderBy("timestamp", "desc")), (snap) => {
        const billContainer = document.getElementById('customerBillList');
        if (snap.empty) {
            billContainer.innerHTML = '<p style="color:gray; text-align:center;">కొత్త బిల్లులు లేవు...</p>';
            return;
        }
        billContainer.innerHTML = "";
        snap.forEach(d => {
            const bill = d.data();
            const stars = "⭐".repeat(bill.rating || 5);
            // ఇక్కడ డేట్ మరియు టైమ్ రెండూ వచ్చేలా మార్చాను
            const fullDate = bill.timestamp ? new Date(bill.timestamp.seconds * 1000).toLocaleString('en-IN') : (bill.time || '');
            
            billContainer.innerHTML += `
                <div class="dmart-bill" id="bill-${d.id}">
                    <div class="dmart-header">
                        <b style="font-size:18px;">KVS RUCHULU</b><br>
                        <small>Tuni, East Godavari</small>
                    </div>
                    <div class="dmart-row"><span>Table: T-${bill.table}</span><span style="font-size:10px;">${fullDate}</span></div>
                    <div class="dmart-row"><span>Customer:</span><span>${bill.customer}</span></div>
                    <div style="border-bottom:1px dashed #000; margin:10px 0;"></div>
                    <div style="font-size:13px;">${bill.items}</div>
                    <div class="dmart-total"><span>Total</span><span>₹${bill.total}</span></div>
                    <div style="font-size:12px; margin-top:5px;">Rating: ${stars}</div>
                    <div class="no-print" style="margin-top:15px; display:flex; gap:10px;">
                        <button style="flex:1; background:#25D366; color:white; border:none; padding:10px; border-radius:5px;" onclick="window.printBill('bill-${d.id}')">PRINT</button>
                        <button style="flex:1; background:#ff4444; color:white; border:none; padding:10px; border-radius:5px;" onclick="window.markDone('${d.id}')">DONE</button>
                    </div>
                </div>`;
        });
    });

    // Live Orders Snapshot
    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
        const list = document.getElementById('orderList');
        list.innerHTML = "";
        snap.forEach(d => {
            const ord = d.data();
            const ordTime = ord.timestamp ? new Date(ord.timestamp.seconds * 1000).toLocaleTimeString() : '';
            list.innerHTML += `
                <div class="live-order-card">
                    <button class="del-btn" onclick="window.deleteOrder('${d.id}')">Done</button>
                    <b>T-${ord.table} | ${ord.customer}</b><br>
                    <small>${ord.items}</small><br>
                    <div style="display:flex; justify-content:space-between; margin-top:5px;">
                        <b style="color:#25D366;">₹${ord.total}</b>
                        <span style="font-size:10px; color:gray;">${ordTime}</span>
                    </div>
                </div>`;
        });
    });

    // Global Window Functions
    window.printBill = (id) => {
        const printContent = document.getElementById(id).innerHTML;
        const originalContent = document.body.innerHTML;
        document.body.innerHTML = `<div class="dmart-bill">${printContent}</div>`;
        window.print();
        location.reload();
    };

    window.markDone = async (id) => {
        if(confirm("ఈ బిల్లును క్లియర్ చేయాలా?")) {
            await deleteDoc(doc(db, "owner_bills", id));
        }
    };

    window.deleteOrder = async (id) => { await deleteDoc(doc(db, "orders", id)); };

    window.showHistory = async (type) => {
        document.getElementById('mainOptions').style.display = 'none';
        document.getElementById('historyResult').style.display = 'block';
        const snap = await getDocs(query(collection(db, "owner_bills"), orderBy("timestamp", "desc")));
        let total = 0;
        let htm = `<h3 style="color:#FFD700; text-align:center;">Report</h3><table><tr><th>Date/Time</th><th>Table</th><th>Bill</th></tr>`;
        snap.forEach(d => {
            const o = d.data();
            if(type === 'all' || o.table == type) {
                const dTime = o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleString('en-IN') : (o.time || '');
                htm += `<tr><td>${dTime}</td><td>T-${o.table}</td><td>₹${o.total}</td></tr>`;
                total += Number(o.total);
            }
        });
        document.getElementById('historyContent').innerHTML = htm + `</table><h2 style="text-align:right; color:#25D366;">Total: ₹${total}</h2>`;
    };

    window.showTablesGrid = () => {
        document.getElementById('mainOptions').style.display = 'none';
        document.getElementById('tablesGrid').style.display = 'block';
        const grid = document.getElementById('gridContainer');
        grid.innerHTML = "";
        for(let i=1; i<=50; i++) {
            const btn = document.createElement('div');
            btn.className = "table-btn";
            btn.innerText = `T-${i}`;
            btn.onclick = () => window.showHistory(i);
            grid.appendChild(btn);
        }
    };

    // Category and Menu Logic
    onSnapshot(query(collection(db, "categories"), orderBy("timestamp", "asc")), (snap) => {
        const tabs = document.getElementById('tabsContainer'), area = document.getElementById('menuArea');
        const select = document.getElementById('categorySelect'), list = document.getElementById('sectorList');
        tabs.innerHTML = ""; area.innerHTML = ""; select.innerHTML = ""; list.innerHTML = "";
        snap.forEach(d => {
            const cat = d.data();
            tabs.innerHTML += `<a href="#${cat.id}" class="sector-btn">${cat.name}</a>`;
            area.innerHTML += `<div class="category-card" id="${cat.id}"><img src="${cat.image}"><h3>${cat.name}</h3><table id="${cat.id}T"></table></div>`;
            select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;"><span>${cat.name}</span><button class="del-btn" onclick="window.deleteCategory('${d.id}')">X</button></div>`;
        });
        loadMenu();
    });

    function loadMenu() {
        onSnapshot(collection(db, "menu_items"), (snap) => {
            document.querySelectorAll('table[id$="T"]').forEach(t => t.innerHTML = "");
            snap.forEach(d => {
                const it = d.data(); const tbl = document.getElementById(it.cat + 'T');
                if(tbl) {
                    const row = tbl.insertRow();
                    row.innerHTML = `<td>${it.name}</td><td>₹${it.price}</td><td style="text-align:right;"><button class="del-btn" onclick="window.deleteMenuItem('${d.id}')">X</button></td>`;
                }
            });
        });
    }

    window.deleteMenuItem = async (id) => { await deleteDoc(doc(db, "menu_items", id)); };
    window.deleteCategory = async (id) => { await deleteDoc(doc(db, "categories", id)); };

    window.updateMenu = async () => {
        const name = document.getElementById('itemName').value, price = document.getElementById('itemPrice').value, cat = document.getElementById('categorySelect').value;
        if(name && price) await addDoc(collection(db, "menu_items"), { name, price: Number(price), cat });
        document.getElementById('itemName').value = ""; document.getElementById('itemPrice').value = "";
    };

    window.openBillModal = () => document.getElementById('billModal').style.display = 'block';
    window.closeBillModal = () => document.getElementById('billModal').style.display = 'none';
    window.openSettings = () => { document.getElementById('settingsModal').style.display = 'block'; backToSettings(); };
    window.closeSettings = () => document.getElementById('settingsModal').style.display = 'none';
    window.backToSettings = () => {
        document.getElementById('mainOptions').style.display = 'block';
        ['sectorManager', 'tablesGrid', 'historyResult'].forEach(id => document.getElementById(id).style.display = 'none');
    };
    window.showSectorManager = () => { document.getElementById('mainOptions').style.display = 'none'; document.getElementById('sectorManager').style.display = 'block'; };

    window.clearAllHistory = async () => {
        if(confirm("సేల్స్ హిస్టరీ మొత్తం డిలీట్ చేయాలా?")) {
            const snap = await getDocs(collection(db, "owner_bills"));
            const batch = writeBatch(db); snap.forEach(d => batch.delete(d.ref)); await batch.commit();
            alert("History Reset Done! ✅");
        }
    };
</script>
</body>
</html>
