<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVS Admin - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* నీ పాత స్టైల్స్ అన్నీ ఇక్కడ ఉంటాయి */
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Poppins', sans-serif; padding: 15px; }
        .header { text-align: center; border-bottom: 2px solid #FFD700; padding-bottom: 10px; margin-bottom: 10px; position: relative; }
        .hotel-name { font-family: 'Righteous', cursive; font-size: 26px; color: #FFD700; text-transform: uppercase; margin-bottom: 5px; }
        .view-menu-link { display: inline-block; color: #25D366; text-decoration: none; font-size: 12px; border: 1px solid #25D366; padding: 3px 10px; border-radius: 15px; font-weight: bold; }
        .settings-btn { position: absolute; right: 0px; top: 5px; font-size: 22px; cursor: pointer; color: #FFD700; border: 1px solid #FFD700; padding: 5px 10px; border-radius: 50%; }
        .tabs-sector { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; border-bottom: 1px solid #333; scrollbar-width: none; }
        .sector-btn { background: transparent; color: #FFD700; border: 1px solid #FFD700; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 13px; font-weight: bold; text-decoration: none; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .container { flex-direction: row; } }
        .left-box { flex: 1; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #444; }
        .right-box { flex: 2; }
        .live-order-card { position: relative; background: #282828; padding: 15px; border-radius: 10px; border-left: 5px solid #25D366; margin-bottom: 10px; }
        .category-card { background: #222; padding: 10px; border-radius: 10px; border-left: 5px solid #FFD700; margin-bottom: 20px; }
        .category-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; }
        .update-btn { background: #FFD700; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; }
        .hide-btn { background: #444; color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; float: right; margin-right:5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; padding: 15px; overflow-y: auto; }
        .modal-content { max-width: 550px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1.5px solid #FFD700; position: relative; }
        .dmart-bill { background: white; color: black; padding: 20px; margin-bottom: 20px; font-family: 'Courier New', monospace; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .table-btn { background: #333; color: #FFD700; border: 1px solid #FFD700; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; font-size: 11px; }
        .menu-option { background: #333; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; text-align: center; color: #FFD700; font-weight: bold; border: 1px solid #444; }
        .qr-card { background: white; padding: 20px; border-radius: 10px; text-align: center; color: black; margin-top: 15px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; }
        th, td { padding: 8px; border-bottom: 1px solid #444; text-align: left; font-size: 12px; }
        @media print { body * { visibility: hidden; } .print-section, .print-section * { visibility: visible; } .print-section { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="header">
    <div class="hotel-name">KVS RUCHULU - ADMIN</div>
    <div id="customerMenuLinkArea"></div>
    <div class="settings-btn" onclick="window.openSettings()">⚙️</div>
</div>

<div style="position:fixed; bottom:30px; right:30px; background:#FFD700; color:#000; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; z-index:4000; cursor:pointer;" onclick="window.openBillModal()">
    <i class="fas fa-file-invoice-dollar"></i>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <button onclick="window.closeSettings()" style="float:right; background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px;">X</button>
        <h2 style="color:#FFD700; text-align:center;">Admin Settings</h2>
        
        <div id="mainOptions">
            <div class="menu-option" onclick="window.showSectorManager()">📁 Manage Categories</div>
            <div class="menu-option" onclick="window.showTablesGrid()">🪑 Table History (1-50)</div>
            <div class="menu-option" onclick="window.showQRSection()" style="background:#FFD700; color:black;">🖨️ Generate Table QR</div>
            <div class="menu-option" onclick="window.showHistory('all')" style="background:#25D366; color:white;">💰 View Total Sales</div>
            <div class="menu-option" onclick="window.logout()" style="background:#444; color:white;">🚪 Logout</div>
        </div>

        <div id="sectorManager" style="display:none;">
            <button onclick="window.backToSettings()" style="background:#555; color:white; padding:5px 10px; border-radius:5px;">⬅ Back</button>
            <div style="margin-top:15px; background:#333; padding:10px; border-radius:8px;">
                <h4 style="margin:0 0 10px 0; color:#FFD700;">Add Category</h4>
                <input type="text" id="newCatName" placeholder="Category Name">
                <input type="file" id="newCatImgFile" accept="image/*">
                <button class="update-btn" onclick="window.addNewCategory()">SAVE CATEGORY</button>
            </div>
            <div id="sectorList" style="margin-top:10px;"></div>
        </div>

        <div id="qrSection" style="display:none;">
            <button onclick="window.backToSettings()" style="background:#555; color:white; padding:5px 10px; border-radius:5px;">⬅ Back</button>
            <div style="text-align:center; margin-top:15px;">
                <input type="number" id="qrTableNum" placeholder="Table No (Ex: 5)">
                <button class="update-btn" onclick="window.generateQR()">GENERATE QR</button>
                <div id="qrResult"></div>
                <div id="qrActions" style="display:none; margin-top:10px; justify-content:center; gap:10px;">
                    <button style="background:#25D366; color:white; border:none; padding:10px; border-radius:5px;" onclick="window.printQR()">Print</button>
                </div>
            </div>
        </div>

        <div id="tablesGrid" style="display:none;">
            <button onclick="window.backToSettings()" style="background:#555; color:white; padding:5px 10px; border-radius:5px;">⬅ Back</button>
            <div class="grid-container" id="grid50"></div>
        </div>

        <div id="historyResult" style="display:none;">
            <button onclick="window.backToSettings()" style="background:#555; color:white; padding:5px 10px; border-radius:5px;">⬅ Back</button>
            <div id="historyContent" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<div id="billModal" class="modal">
    <div class="modal-content">
        <button onclick="window.closeBillModal()" style="position:absolute; right:15px; top:15px; background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">X</button>
        <h2 style="color:#FFD700; text-align:center;">Today's Bills</h2>
        <div id="customerBillList"></div>
    </div>
</div>

<div class="tabs-sector" id="tabsContainer"></div>

<div class="container">
    <div class="left-box">
        <h4 style="color:#FFD700; margin-top:0;">Add Menu Item</h4>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Price">
        <select id="categorySelect"></select>
        <button class="update-btn" onclick="window.updateMenu()">ADD TO MENU</button>
        <h4 style="color:#25D366; border-top:1px solid #444; padding-top:15px; margin-top:20px;">📥 LIVE ORDERS</h4>
        <div id="orderList"></div>
    </div>
    <div class="right-box" id="menuArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, doc, deleteDoc, getDocs, addDoc, updateDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYOgbu7yfwlSps_-32frEedWss1qmRQoM",
        authDomain: "kvs-project-c60d8.firebaseapp.com",
        projectId: "kvs-project-c60d8",
        storageBucket: "kvs-project-c60d8.appspot.com",
        messagingSenderId: "905673301986",
        appId: "1:905673301986:web:aad1477b1098d7cbf66380"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentOwnerId = "";

    // Auth State Check
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentOwnerId = user.uid;
            setupLink();
            startListeners();
        } else {
            window.location.href = "login.html";
        }
    });

    function setupLink() {
        const url = `https://ramanakarri147-crypto.github.io/kvs-restaurant/index.html?owner=${currentOwnerId}&table=1`;
        document.getElementById('customerMenuLinkArea').innerHTML = `<a href="${url}" target="_blank" class="view-menu-link"><i class="fas fa-external-link-alt"></i> View Customer Menu</a>`;
    }

    function startListeners() {
        // Categories
        onSnapshot(query(collection(db, "categories"), where("ownerId", "==", currentOwnerId)), (snap) => {
            const t = document.getElementById('tabsContainer'), a = document.getElementById('menuArea'), s = document.getElementById('categorySelect'), l = document.getElementById('sectorList');
            t.innerHTML = ""; a.innerHTML = ""; s.innerHTML = ""; l.innerHTML = "";
            snap.forEach(d => {
                const cat = d.data();
                t.innerHTML += `<a href="#${d.id}" class="sector-btn">${cat.name}</a>`;
                a.innerHTML += `<div class="category-card" id="${d.id}"><img src="${cat.image}" onerror="this.style.display='none'"><h3>${cat.name}</h3><table id="${d.id}T"></table></div>`;
                s.innerHTML += `<option value="${d.id}">${cat.name}</option>`;
                l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #444;"><span>${cat.name}</span><button class="del-btn" style="padding:2px 8px;" onclick="window.deleteCat('${d.id}')">X</button></div>`;
            });
            loadMenu();
        });

        // Live Orders
        onSnapshot(query(collection(db, "orders"), where("ownerId", "==", currentOwnerId)), (snap) => {
            const oL = document.getElementById('orderList'); oL.innerHTML = "";
            snap.forEach(d => {
                const o = d.data();
                oL.innerHTML += `<div class="live-order-card">
                    <button class="del-btn" onclick="window.deleteOrder('${d.id}')">Done</button>
                    <b>T-${o.table} | ${o.customer}</b><br><small>${o.items}</small>
                    <div style="margin-top:5px; border-top:1px solid #444; padding-top:5px;"><b style="color:#25D366;">₹${o.total}</b></div>
                </div>`;
            });
        });

        // Bills List
        onSnapshot(query(collection(db, "owner_bills"), where("ownerId", "==", currentOwnerId)), (snap) => {
            const c = document.getElementById('customerBillList'); c.innerHTML = "";
            snap.forEach(d => {
                const b = d.data();
                const div = document.createElement('div'); div.className = 'dmart-bill'; div.id = `b-${d.id}`;
                div.innerHTML = `<div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:5px;"><b>KVS RUCHULU</b></div>
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin:5px 0;"><span>Table: ${b.table}</span></div>
                    <div style="font-size:13px; margin:10px 0;"><b>Name: ${b.customer}</b><br>${b.items}</div>
                    <div style="border-top:1px dashed #000; font-weight:bold; display:flex; justify-content:space-between; padding-top:5px;"><span>Total</span><span>₹${b.total}</span></div>
                    <div class="no-print" style="margin-top:10px; display:flex; gap:5px;">
                        <button style="flex:1; background:#007bff; color:white; border:none; padding:8px; border-radius:5px;" onclick="window.printB('b-${d.id}')">PRINT</button>
                        <button style="flex:1; background:#ff4444; color:white; border:none; padding:8px; border-radius:5px;" onclick="window.markDone('${d.id}')">DONE</button>
                    </div>`;
                c.appendChild(div);
            });
        });
    }

    function loadMenu() {
        onSnapshot(query(collection(db, "menu_items"), where("ownerId", "==", currentOwnerId)), (snap) => {
            document.querySelectorAll('table[id$="T"]').forEach(t => t.innerHTML = "");
            snap.forEach(d => {
                const it = d.data(); const tbl = document.getElementById(it.cat + 'T');
                if(tbl) {
                    const row = tbl.insertRow(); const hide = it.status === "hidden";
                    row.innerHTML = `<td>${it.name}</td><td>₹${it.price}</td><td style="text-align:right;">
                        <button class="hide-btn" onclick="window.toggleH('${d.id}','${it.status}')" style="color:${hide?'red':'#25D366'}"><i class="fas ${hide?'fa-eye-slash':'fa-eye'}"></i></button>
                        <button class="del-btn" style="padding:2px 8px;" onclick="window.deleteM('${d.id}')">X</button></td>`;
                }
            });
        });
    }

    window.addNewCategory = async () => {
        const n = document.getElementById('newCatName').value, f = document.getElementById('newCatImgFile').files[0];
        if(!n || !f) return alert("పేరు మరియు ఫోటో ఇవ్వండి!");
        const r = new FileReader();
        r.onload = async (e) => {
            await addDoc(collection(db, "categories"), { name: n, image: e.target.result, ownerId: currentOwnerId, timestamp: serverTimestamp() });
            document.getElementById('newCatName').value = ""; document.getElementById('newCatImgFile').value = "";
        };
        r.readAsDataURL(f);
    };

    window.updateMenu = async () => {
        const n = document.getElementById('itemName').value, p = document.getElementById('itemPrice').value, c = document.getElementById('categorySelect').value;
        if(n && p && c) {
            await addDoc(collection(db, "menu_items"), { name: n, price: Number(p), cat: c, ownerId: currentOwnerId, status: "visible" });
            document.getElementById('itemName').value = ""; document.getElementById('itemPrice').value = "";
        } else alert("అన్ని వివరాలు నింపండి!");
    };

    window.generateQR = () => {
        const num = document.getElementById('qrTableNum').value;
        if(!num) return alert("టేబుల్ నంబర్ ఇవ్వండి!");
        const res = document.getElementById('qrResult'); res.innerHTML = "";
        const qrCard = document.createElement('div'); qrCard.className = "qr-card"; qrCard.id = "qrcard";
        qrCard.innerHTML = `<div id="qro" style="display:flex; justify-content:center;"></div><br><b style="font-size:18px;">TABLE - ${num}</b><br><small>KVS RUCHULU</small>`;
        res.appendChild(qrCard);
        new QRCode(document.getElementById("qro"), { text: `https://ramanakarri147-crypto.github.io/kvs-restaurant/index.html?owner=${currentOwnerId}&table=${num}`, width: 150, height: 150 });
        document.getElementById('qrActions').style.display = 'flex';
    };

    window.logout = async () => { await signOut(auth); window.location.href = "login.html"; };
    window.deleteOrder = async (id) => await deleteDoc(doc(db, "orders", id));
    window.markDone = async (id) => await deleteDoc(doc(db, "owner_bills", id));
    window.deleteM = async (id) => confirm("Delete?") && await deleteDoc(doc(db, "menu_items", id));
    window.deleteCat = async (id) => confirm("Delete Category?") && await deleteDoc(doc(db, "categories", id));
    window.toggleH = async (id, s) => await updateDoc(doc(db, "menu_items", id), { status: s === "hidden" ? "visible" : "hidden" });

    window.showHistory = async (type) => {
        document.getElementById('mainOptions').style.display = 'none'; document.getElementById('tablesGrid').style.display = 'none'; document.getElementById('historyResult').style.display = 'block';
        const s = await getDocs(query(collection(db, "owner_bills"), where("ownerId", "==", currentOwnerId)));
        let tot = 0, h = `<table><tr><th>Table</th><th>Total</th></tr>`;
        s.forEach(d => {
            const b = d.data();
            if(type === 'all' || b.table == type) {
                h += `<tr><td>T-${b.table}</td><td>₹${b.total}</td></tr>`;
                tot += Number(b.total);
            }
        });
        document.getElementById('historyContent').innerHTML = h + `</table><h2 style="color:#25D366; text-align:center;">Total: ₹${tot}</h2>`;
    };

    // UI Helpers
    window.openSettings = () => document.getElementById('settingsModal').style.display = 'block';
    window.closeSettings = () => document.getElementById('settingsModal').style.display = 'none';
    window.openBillModal = () => document.getElementById('billModal').style.display = 'block';
    window.closeBillModal = () => document.getElementById('billModal').style.display = 'none';
    window.backToSettings = () => { document.getElementById('mainOptions').style.display = 'block'; ['sectorManager', 'tablesGrid', 'historyResult', 'qrSection'].forEach(id => document.getElementById(id).style.display = 'none'); };
    window.showSectorManager = () => { document.getElementById('mainOptions').style.display = 'none'; document.getElementById('sectorManager').style.display = 'block'; };
    window.showQRSection = () => { document.getElementById('mainOptions').style.display = 'none'; document.getElementById('qrSection').style.display = 'block'; };
    window.showTablesGrid = () => {
        document.getElementById('mainOptions').style.display = 'none'; document.getElementById('tablesGrid').style.display = 'block';
        const g = document.getElementById('grid50'); g.innerHTML = "";
        for(let i=1; i<=50; i++) {
            const btn = document.createElement('div'); btn.className="table-btn"; btn.innerText=`T-${i}`; btn.onclick=()=>window.showHistory(i); g.appendChild(btn);
        }
    };
    window.printB = (id) => { document.getElementById(id).classList.add('print-section'); window.print(); document.getElementById(id).classList.remove('print-section'); };
    window.printQR = () => { document.getElementById('qrcard').classList.add('print-section'); window.print(); document.getElementById('qrcard').classList.remove('print-section'); };
</script>
</body>
</html>
