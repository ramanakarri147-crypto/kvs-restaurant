<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>KVS Admin - Complete Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Poppins', sans-serif; padding: 15px; }
        .header { text-align: center; border-bottom: 2px solid #FFD700; padding-bottom: 10px; margin-bottom: 10px; position: relative; }
        .hotel-name { font-family: 'Righteous', cursive; font-size: 28px; color: #FFD700; text-transform: uppercase; }
        .settings-btn { position: absolute; right: 0px; top: 5px; font-size: 22px; cursor: pointer; color: #FFD700; border: 1px solid #FFD700; padding: 5px 10px; border-radius: 50%; }
        
        .search-container { margin: 10px 0; text-align: center; }
        .search-input { width: 95%; padding: 12px; border-radius: 25px; border: 1px solid #FFD700; background: #333; color: white; outline: none; }

        .tabs-sector { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; position: sticky; top: 0; background: #1a1a1a; z-index: 1000; scrollbar-width: none; border-bottom: 1px solid #333; }
        .sector-btn { background: transparent; color: #FFD700; border: 1px solid #FFD700; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: bold; text-decoration: none; }
        
        .container { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .container { flex-direction: row; } }

        .left-box { flex: 1; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #444; height: fit-content; position: sticky; top: 70px; }
        .right-box { flex: 2; }
        
        .category-card { background: #222; padding: 10px; border-radius: 10px; border-left: 5px solid #FFD700; margin-bottom: 20px; }
        .category-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; }
        .update-btn { background: #FFD700; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }
        .view-btn { background: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        
        /* Eye Icon Style */
        .eye-toggle { background: none; border: none; color: #FFD700; cursor: pointer; font-size: 16px; padding: 5px; }
        .item-hidden { opacity: 0.4; } /* హైడ్ చేసిన ఐటమ్ ఓనర్‌కి మసకగా కనిపిస్తుంది */

        .live-order-card { background: #282828; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 5px solid #25D366; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .order-time { font-size: 11px; color: #FFD700; font-weight: bold; margin-bottom: 5px; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 15px; overflow-y: auto; }
        .modal-content { max-width: 700px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1.5px solid #FFD700; }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .table-btn { background: #333; color: #FFD700; border: 1px solid #FFD700; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; }
        .menu-option { background: #333; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; text-align: center; color: #FFD700; font-weight: bold; border: 1px solid #444; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; color: white; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; font-size: 13px; }
        th { color: #FFD700; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <div class="hotel-name">KVS RESTAURANT - ADMIN</div>
    <div class="settings-btn" onclick="openSettings()">⚙️</div>
</div>

<div class="search-container">
    <input type="text" id="adminSearch" class="search-input" placeholder="మెనూ ఐటమ్ వెతకండి..." onkeyup="adminSearchFood()">
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <button onclick="closeSettings()" style="float:right; background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px;">X</button>
        <h2 id="modalTitle" style="color:#FFD700; text-align:center;">Admin Settings</h2>
        
        <div id="mainOptions">
            <div class="menu-option" onclick="showSectorManager()">📁 Manage Categories (Sectors)</div>
            <div class="menu-option" onclick="showTablesGrid()">🪑 Table-wise History (1-50)</div>
            <div class="menu-option" onclick="window.showHistory('all')" style="background:#25D366; color:white;">💰 View Total Sales (All)</div>
            <div class="menu-option" onclick="window.clearAllHistory()" style="background:#ff4444; color:white;">⚠️ Reset Sales History</div>
        </div>

        <div id="sectorManager" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-bottom: 10px;">⬅ Back</button>
            <input type="text" id="newSectorName" placeholder="Category Name (Ex: Biryani)">
            <input type="file" id="newSectorImage" accept="image/*">
            <button id="addBtn" onclick="window.addNewSector()" style="background:#FFD700; border:none; padding:12px; width:100%; border-radius:5px; font-weight:bold;">UPLOAD NEW SECTOR</button>
            <div id="sectorList" style="margin-top:20px;"></div>
        </div>

        <div id="tablesGrid" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">⬅ Back</button>
            <h3 style="color:#FFD700; text-align:center;">Select Table</h3>
            <div class="grid-50" id="gridContainer"></div>
        </div>

        <div id="historyResult" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-top:10px;">⬅ Back</button>
            <div id="historyContent"></div>
        </div>
    </div>
</div>

<div class="tabs-sector" id="tabsContainer"></div>

<div class="container">
    <div class="left-box">
        <h4 style="margin-top:0; color:#FFD700;">Add Menu Item</h4>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Price">
        <select id="categorySelect"></select>
        <button class="update-btn" onclick="updateMenu()">ADD TO MENU</button>
        <a href="index.html" class="view-btn" target="_blank">VIEW CUSTOMER PAGE</a>
        
        <h4 style="color:#25D366; border-top:1px solid #444; padding-top:15px; margin-top:25px;">📥 LIVE ORDERS</h4>
        <div id="orderList"></div>
    </div>
    <div class="right-box" id="menuArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, getDocs, addDoc, setDoc, updateDoc, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYOgbu7yfwlSps_-32frEedWss1qmRQoM", 
        authDomain: "kvs-project-c60d8.firebaseapp.com",
        projectId: "kvs-project-c60d8",
        storageBucket: "kvs-project-c60d8.appspot.com",
        messagingSenderId: "905673301986",
        appId: "1:905673301986:web:aad1477b1098d7cbf66380"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const IMGBB_KEY = "88c8d1427e7d391a5c87ffd3134463f1";

    let isFirstLoad = true;

    function playVoiceNotification() {
        if (isFirstLoad) return;
        const msg = new SpeechSynthesisUtterance();
        msg.text = "మీకు కొత్త ఆర్డర్ వచ్చింది చూడండి బ్రో";
        msg.lang = 'te-IN';
        window.speechSynthesis.speak(msg);
    }

    // --- Eye Icon Toggle Function ---
    window.toggleVisibility = async (id, currentStatus) => {
        const newStatus = currentStatus === "hidden" ? "visible" : "hidden";
        try {
            await updateDoc(doc(db, "menu_items", id), { status: newStatus });
        } catch (e) {
            alert("Error updating visibility!");
        }
    };

    window.showHistory = async (type) => {
        document.getElementById('mainOptions').style.display = 'none';
        document.getElementById('tablesGrid').style.display = 'none';
        document.getElementById('historyResult').style.display = 'block';
        
        const snap = await getDocs(query(collection(db, "orders"), orderBy("timestamp", "desc")));
        let total = 0;
        let htm = `<h3 style="color:#FFD700; text-align:center;">${type === 'all' ? 'Total Sales' : 'Table ' + type} Report</h3>
                   <table><tr><th>Date/Time</th><th>Table (Name)</th><th>Bill</th></tr>`;
        
        snap.forEach(d => {
            const o = d.data();
            if(type === 'all' || o.table == type) {
                let dtStr = "N/A";
                if(o.timestamp) {
                    const dt = o.timestamp.toDate();
                    dtStr = dt.toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                }
                htm += `<tr><td>${dtStr}</td><td>T-${o.table} (${o.customer || 'Guest'})</td><td>₹${o.total}</td></tr>`;
                total += Number(o.total);
            }
        });
        document.getElementById('historyContent').innerHTML = htm + `</table><h2 style="text-align:right; color:#25D366; margin-top:20px;">Total: ₹${total}</h2>`;
    };

    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
        const list = document.getElementById('orderList');
        if (!isFirstLoad && snap.docChanges().some(change => change.type === "added")) playVoiceNotification();
        isFirstLoad = false;
        list.innerHTML = "";
        snap.forEach(d => {
            const ord = d.data();
            let dateTimeStr = "";
            if(ord.timestamp) {
                const dt = ord.timestamp.toDate();
                dateTimeStr = dt.toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
            } else {
                dateTimeStr = "Processing...";
            }

            list.innerHTML += `<div class="live-order-card">
                <button class="del-btn" onclick="deleteDoc(doc(db,'orders','${d.id}'))">Done</button>
                <div class="order-time">📅 ${dateTimeStr}</div>
                <b style="font-size:16px;">T-${ord.table} | ${ord.customer}</b><br>
                <small style="color:#ccc;">${ord.items}</small><br>
                <b style="color:#25D366; font-size:18px;">₹${ord.total}</b>
            </div>`;
        });
    });

    window.adminSearchFood = () => {
        let q = document.getElementById('adminSearch').value.toLowerCase();
        let cards = document.querySelectorAll('.category-card');
        cards.forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    };

    window.clearAllHistory = async () => {
        if(confirm("సేల్స్ హిస్టరీ మొత్తం డిలీట్ చేయాలా?")) {
            const snap = await getDocs(collection(db, "orders"));
            const batch = writeBatch(db); snap.forEach(d => batch.delete(d.ref)); await batch.commit();
            alert("History Reset Done! ✅");
        }
    };

    window.addNewSector = async () => {
        const name = document.getElementById('newSectorName').value, file = document.getElementById('newSectorImage').files[0];
        if(!name || !file) return alert("Please select name and image!");
        const btn = document.getElementById('addBtn'); btn.innerText = "Uploading...";
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
        const data = await res.json();
        const id = name.toLowerCase().replace(/\s+/g, '');
        await setDoc(doc(db, "categories", id), { name, id, image: data.data.url, timestamp: serverTimestamp() });
        btn.innerText = "UPLOAD NEW SECTOR";
    };

    onSnapshot(query(collection(db, "categories"), orderBy("timestamp", "asc")), (snap) => {
        const tabs = document.getElementById('tabsContainer'), area = document.getElementById('menuArea');
        const select = document.getElementById('categorySelect'), list = document.getElementById('sectorList');
        tabs.innerHTML = ""; area.innerHTML = ""; select.innerHTML = ""; list.innerHTML = "";
        snap.forEach(d => {
            const cat = d.data();
            tabs.innerHTML += `<a href="#${cat.id}" class="sector-btn">${cat.name}</a>`;
            area.innerHTML += `<div class="category-card" id="${cat.id}"><img src="${cat.image}"><h3>${cat.name}</h3><table id="${cat.id}T"></table></div>`;
            select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;"><span>${cat.name}</span><button class="del-btn" onclick="deleteDoc(doc(db,'categories','${d.id}'))">X</button></div>`;
        });
        loadMenu();
    });

    function loadMenu() {
        onSnapshot(collection(db, "menu_items"), (snap) => {
            document.querySelectorAll('table[id$="T"]').forEach(t => t.innerHTML = "");
            snap.forEach(d => {
                const it = d.data(); 
                const tbl = document.getElementById(it.cat + 'T');
                const status = it.status || "visible";
                const isHidden = status === "hidden";
                
                if(tbl) {
                    const row = tbl.insertRow();
                    if(isHidden) row.className = "item-hidden";
                    row.innerHTML = `
                        <td>${it.name}</td>
                        <td>₹${it.price}</td>
                        <td style="text-align:right;">
                            <button class="eye-toggle" onclick="toggleVisibility('${d.id}', '${status}')">
                                <i class="fa ${isHidden ? 'fa-eye-slash' : 'fa-eye'}"></i>
                            </button>
                            <button class="del-btn" style="float:none; margin-left:10px;" onclick="deleteDoc(doc(db,'menu_items','${d.id}'))">X</button>
                        </td>`;
                }
            });
        });
    }

    window.updateMenu = async () => {
        const name = document.getElementById('itemName').value, price = document.getElementById('itemPrice').value, cat = document.getElementById('categorySelect').value;
        if(name && price) await addDoc(collection(db, "menu_items"), { name, price: Number(price), cat, status: "visible" });
        document.getElementById('itemName').value = ""; document.getElementById('itemPrice').value = "";
    };

    window.openSettings = () => { document.getElementById('settingsModal').style.display = 'block'; backToSettings(); };
    window.closeSettings = () => document.getElementById('settingsModal').style.display = 'none';
    window.backToSettings = () => {
        document.getElementById('mainOptions').style.display = 'block';
        document.getElementById('sectorManager').style.display = 'none';
        document.getElementById('tablesGrid').style.display = 'none';
        document.getElementById('historyResult').style.display = 'none';
        document.getElementById('modalTitle').innerText = "Admin Settings";
    };
    window.showSectorManager = () => { document.getElementById('mainOptions').style.display = 'none'; document.getElementById('sectorManager').style.display = 'block'; };
    window.showTablesGrid = () => {
        document.getElementById('mainOptions').style.display = 'none'; document.getElementById('tablesGrid').style.display = 'block';
        const grid = document.getElementById('gridContainer'); grid.innerHTML = "";
        for(let i=1; i<=50; i++) grid.innerHTML += `<div class="table-btn" onclick="window.showHistory(${i})">T-${i}</div>`;
    };
    
    window.deleteDoc = deleteDoc; window.doc = doc; window.db = db; window.toggleVisibility = toggleVisibility;
</script>
</body>
</html>
