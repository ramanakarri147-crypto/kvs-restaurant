<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>KVS Admin Panel - Complete Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #FFD700; padding-bottom: 20px; margin-bottom: 10px; position: relative; }
        .hotel-name { font-family: 'Righteous', cursive; font-size: 35px; color: #FFD700; text-transform: uppercase; }
        .settings-btn { position: absolute; right: 10px; top: 10px; font-size: 24px; cursor: pointer; color: #FFD700; background: rgba(255,215,0,0.1); padding: 5px 10px; border-radius: 50%; border: 1px solid #FFD700; }
        .tabs-sector { display: flex; overflow-x: auto; gap: 10px; padding: 15px 0; position: sticky; top: 0; background: #1a1a1a; z-index: 1000; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .sector-btn { background: transparent; color: #FFD700; border: 1px solid #FFD700; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        .container { display: flex; gap: 20px; align-items: flex-start; }
        .left-box { flex: 1; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1.5px solid #444; position: sticky; top: 80px; }
        .right-box { flex: 2; display: flex; flex-direction: column; gap: 20px; }
        .category-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border-left: 5px solid #FFD700; margin-bottom: 15px; }
        .category-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; }
        .update-btn { background: #FFD700; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; float: right; }
        .live-order-card { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #25D366; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 800px; margin: auto; background: #222; padding: 20px; border-radius: 15px; border: 1px solid #FFD700; }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .table-btn { background: #333; color: #FFD700; border: 1px solid #FFD700; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; }
        .menu-option { background: #444; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; text-align: center; color: #FFD700; font-weight: bold; }
        .sector-list-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; margin: 5px 0; border-radius: 5px; }
        .preview-img { width: 45px; height: 45px; object-fit: cover; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="header">
    <div class="hotel-name">KVS RESTAURANT - ADMIN PANEL</div>
    <div class="settings-btn" onclick="openSettings()">⚙️</div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <button onclick="closeSettings()" style="float:right; background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">X</button>
        <h2 id="modalTitle" style="color:#FFD700;">Settings</h2>
        
        <div id="mainOptions">
            <div class="menu-option" onclick="showSectorManager()">📁 Manage Sectors (Add Name & Image)</div>
            <div class="menu-option" onclick="showTablesGrid()">📂 Tables (1-50) & History</div>
        </div>

        <div id="sectorManager" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-bottom: 15px;">⬅ Back</button>
            <div style="background:rgba(255,215,0,0.1); padding: 15px; border-radius: 10px;">
                <input type="text" id="newSectorName" placeholder="సెక్టార్ పేరు">
                <input type="file" id="newSectorImage" accept="image/*">
                <button id="addSectorBtn" onclick="window.addNewSector()" style="background:#FFD700; border:none; padding:10px; width:100%; border-radius:5px; font-weight:bold; cursor:pointer;">+ ADD SECTOR (FREE UPLOAD)</button>
            </div>
            <div id="sectorListContainer" style="margin-top:20px;"></div>
        </div>

        <div id="tablesGrid" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">⬅ Back</button>
            <div class="grid-50" id="gridContainer"></div>
        </div>

        <div id="historyResult" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-top:10px;">⬅ Back</button>
            <div id="historyContent"></div>
        </div>
    </div>
</div>

<div class="tabs-sector" id="tabsContainer"></div>

<div class="container">
    <div class="left-box">
        <h3>Add Food Item</h3>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Price">
        <select id="category"></select>
        <button class="update-btn" onclick="updateRightSide()">UPDATE MENU</button>
        
        <h3 style="color:#25D366; margin-top:30px; border-top:1px solid #444; padding-top:15px;">📥 LIVE ORDERS</h3>
        <div id="order-display-list"></div>
    </div>
    <div class="right-box" id="menuDataArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, getDocs, addDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYOgbu7yfwlSps_-32frEedWss1qmRQoM", 
        authDomain: "kvs-project-c60d8.firebaseapp.com",
        projectId: "kvs-project-c60d8",
        storageBucket: "kvs-project-c60d8.appspot.com",
        messagingSenderId: "905673301986",
        appId: "1:905673301986:web:aad1477b1098d7cbf66380"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const IMGBB_API_KEY = "88c8d1427e7d391a5c87ffd3134463f1";

    // Sector Management with ImgBB
    window.addNewSector = async () => {
        const name = document.getElementById('newSectorName').value;
        const file = document.getElementById('newSectorImage').files[0];
        const btn = document.getElementById('addSectorBtn');
        if(!name || !file) return alert("పేరు మరియు ఫోటో ఇవ్వండి!");

        btn.disabled = true; btn.innerText = "Uploading... ⏳";
        try {
            const formData = new FormData(); formData.append("image", file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
            const data = await res.json();
            const sectorId = name.toLowerCase().replace(/\s+/g, '');
            await setDoc(doc(db, "categories", sectorId), { name, id: sectorId, image: data.data.url, timestamp: serverTimestamp() });
            alert("Success!");
        } catch(e) { alert("Error!"); }
        btn.disabled = false; btn.innerText = "+ ADD SECTOR (FREE UPLOAD)";
    };

    window.deleteSector = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "categories", id)); };

    // Real-time Listeners
    onSnapshot(query(collection(db, "categories"), orderBy("timestamp", "asc")), (snapshot) => {
        const tabs = document.getElementById('tabsContainer');
        const menuArea = document.getElementById('menuDataArea');
        const dropdown = document.getElementById('category');
        const list = document.getElementById('sectorListContainer');
        tabs.innerHTML = ""; menuArea.innerHTML = ""; dropdown.innerHTML = ""; list.innerHTML = "";

        snapshot.forEach((d) => {
            const cat = d.data();
            tabs.innerHTML += `<a href="#${cat.id}" class="sector-btn">${cat.name}</a>`;
            menuArea.innerHTML += `<div class="category-card" id="${cat.id}"><img src="${cat.image}"><h3>${cat.name}</h3><table id="${cat.id}Table"></table></div>`;
            dropdown.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            list.innerHTML += `<div class="sector-list-item"><img src="${cat.image}" class="preview-img"><span>${cat.name}</span><button class="del-btn" onclick="window.deleteSector('${d.id}')">X</button></div>`;
        });
        loadItems();
    });

    function loadItems() {
        onSnapshot(collection(db, "menu_items"), (snapshot) => {
            document.querySelectorAll('table[id$="Table"]').forEach(t => t.innerHTML = "");
            snapshot.forEach((d) => {
                const item = d.data();
                const table = document.getElementById(item.cat + 'Table');
                if(table) table.insertRow().innerHTML = `<td>${item.name}</td><td>₹${item.price}</td><td><button class="del-btn" onclick="window.deleteItem('${d.id}')">X</button></td>`;
            });
        });
    }

    window.updateRightSide = async () => {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const cat = document.getElementById('category').value;
        if(name && price) await addDoc(collection(db, "menu_items"), { name, price: Number(price), cat });
    };

    window.deleteItem = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "menu_items", id)); };

    // LIVE ORDERS & HISTORY
    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snapshot) => {
        const list = document.getElementById('order-display-list');
        list.innerHTML = "";
        snapshot.forEach(d => {
            const ord = d.data();
            list.innerHTML += `<div class="live-order-card">
                <button onclick="window.deleteOrder('${d.id}')" style="float:right; background:red; color:white; border:none; padding:5px; cursor:pointer;">X</button>
                <b>Table: ${ord.table}</b> | ₹${ord.total}<br>
                <small>${ord.items}</small><br>
                <span style="font-size:10px; color:#888;">${ord.time || ''}</span>
            </div>`;
        });
    });

    window.deleteOrder = async (id) => { if(confirm("Clear Order?")) await deleteDoc(doc(db, "orders", id)); };

    window.showHistory = async (type) => {
        document.getElementById('tablesGrid').style.display = 'none';
        document.getElementById('historyResult').style.display = 'block';
        const content = document.getElementById('historyContent');
        const snap = await getDocs(query(collection(db, "orders"), orderBy("timestamp", "desc")));
        let total = 0;
        let htm = `<table><tr><th>Time</th><th>Table</th><th>Items</th><th>Bill</th></tr>`;
        snap.forEach(d => {
            const data = d.data();
            if(type === 'all' || data.table == type) {
                htm += `<tr><td>${data.time || ''}</td><td>${data.table}</td><td>${data.items}</td><td>₹${data.total}</td></tr>`;
                total += Number(data.total);
            }
        });
        content.innerHTML = htm + `</table><h3 style="text-align:right; color:#25D366;">Grand Total: ₹${total}</h3>`;
    };

    window.openSettings = () => { document.getElementById('settingsModal').style.display = 'block'; backToSettings(); };
    window.closeSettings = () => { document.getElementById('settingsModal').style.display = 'none'; };
    window.backToSettings = () => {
        document.getElementById('mainOptions').style.display = 'block';
        document.getElementById('sectorManager').style.display = 'none';
        document.getElementById('tablesGrid').style.display = 'none';
        document.getElementById('historyResult').style.display = 'none';
    };
    window.showSectorManager = () => { document.getElementById('mainOptions').style.display = 'none'; document.getElementById('sectorManager').style.display = 'block'; };
    window.showTablesGrid = () => {
        document.getElementById('mainOptions').style.display = 'none';
        document.getElementById('tablesGrid').style.display = 'block';
        const grid = document.getElementById('gridContainer');
        grid.innerHTML = `<button onclick="window.showHistory('all')" style="grid-column: span 5; padding:15px; background:#25D366; color:black; font-weight:bold; border:none; border-radius:5px; cursor:pointer;">VIEW TOTAL HISTORY (ALL TABLES)</button>`;
        for(let i=1; i<=50; i++) grid.innerHTML += `<div class="table-btn" onclick="window.showHistory(${i})">T-${i}</div>`;
    };
</script>
</body>
</html>
