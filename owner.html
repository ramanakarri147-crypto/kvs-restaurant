<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>KVS Admin Panel - Full Stable Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* పాత CSS అంతా అలాగే ఉంది */
        html { scroll-behavior: smooth; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #FFD700; padding-bottom: 20px; margin-bottom: 10px; position: relative; }
        .hotel-name { font-family: 'Righteous', cursive; font-size: 35px; color: #FFD700; text-transform: uppercase; }
        .settings-btn { position: absolute; right: 10px; top: 10px; font-size: 24px; cursor: pointer; color: #FFD700; background: rgba(255,215,0,0.1); padding: 5px 10px; border-radius: 50%; border: 1px solid #FFD700; }
        .tabs-sector { display: flex; overflow-x: auto; gap: 10px; padding: 15px 0; position: sticky; top: 0; background: #1a1a1a; z-index: 1000; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .sector-btn { background: transparent; color: #FFD700; border: 1px solid #FFD700; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        .container { display: flex; gap: 20px; align-items: flex-start; }
        .left-box { flex: 1; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1.5px solid #444; position: sticky; top: 80px; }
        .right-box { flex: 2; display: flex; flex-direction: column; gap: 20px; }
        .category-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border-left: 5px solid #FFD700; scroll-margin-top: 100px; margin-bottom: 15px; }
        h3 { color: #FFD700; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; }
        .update-btn { background: #FFD700; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; font-size: 16px; margin-bottom: 10px; }
        .view-btn { background: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 15px; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; }
        #owner-orders-section { margin-top: 30px; padding: 20px; background: #111; border: 2px solid #25D366; border-radius: 15px; }
        .live-order-card { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #25D366; position: relative; }
        .table-badge { background: #25D366; color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; margin-left: 10px; }
        .order-time { display: block; color: #888; font-size: 11px; margin-top: 8px; font-weight: bold; border-top: 1px solid #333; padding-top: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { max-width: 800px; margin: auto; background: #222; padding: 20px; border-radius: 15px; border: 1px solid #FFD700; }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .table-btn { background: #333; color: #FFD700; border: 1px solid #FFD700; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; }
        .menu-option { background: #444; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; color: #FFD700; }
        
        /* New Sector List Style */
        .sector-list-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 3px solid #FFD700; }
    </style>
</head>
<body>

<div class="header">
    <div class="hotel-name">KVS RESTAURANT - ADMIN PANEL</div>
    <div class="settings-btn" onclick="openSettings()">⚙️</div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <button onclick="closeSettings()" style="float:right; background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius: 5px;">X</button>
        <h2 id="modalTitle" style="color:#FFD700;">Settings</h2>
        
        <div id="mainOptions">
            <div class="menu-option" onclick="showSectorManager()">📁 Manage Sectors (Add/Delete)</div>
            <div class="menu-option" onclick="showTablesGrid()">📂 Tables (1-50)</div>
            <div class="menu-option" onclick="showHistory('all')">📊 Total History</div>
        </div>

        <div id="sectorManager" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-bottom: 15px;">⬅ Back</button>
            <div style="background:rgba(255,215,0,0.1); padding: 15px; border-radius: 10px;">
                <input type="text" id="newSectorName" placeholder="కొత్త సెక్టార్ పేరు (Ex: Snacks)">
                <button onclick="window.addNewSector()" style="background:#FFD700; border:none; padding:10px; width:100%; border-radius:5px; font-weight:bold; cursor:pointer;">+ ADD SECTOR</button>
            </div>
            <h3 style="margin-top:20px; font-size:16px;">ప్రస్తుత సెక్టార్లు:</h3>
            <div id="sectorListContainer"></div>
        </div>

        <div id="tablesGrid" style="display:none;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">⬅ Back</button>
            <div class="grid-50" id="gridContainer"></div>
        </div>
        
        <div id="historyResult" style="display:none; margin-top:20px;">
            <button onclick="backToSettings()" style="background:#555; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">⬅ Back</button>
            <div id="historyContent" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<div class="tabs-sector" id="tabsContainer"></div>

<div class="container">
    <div class="left-box">
        <h3>Add Food Item</h3>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Price">
        
        <select id="category"></select>
        
        <button class="update-btn" onclick="updateRightSide()">UPDATE CUSTOMER MENU</button>
        <a href="index.html" class="view-btn" target="_blank">VIEW CUSTOMER MENU</a>

        <div id="owner-orders-section">
            <h3 style="color: #25D366; text-align: center;">📥 LIVE ORDERS</h3>
            <div id="order-display-list"></div>
        </div>
    </div>

    <div class="right-box" id="menuDataArea"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYOgbu7yfwlSps_-32frEedWss1qmRQoM", 
        authDomain: "kvs-project-c60d8.firebaseapp.com",
        projectId: "kvs-project-c60d8",
        storageBucket: "kvs-project-c60d8.appspot.com",
        messagingSenderId: "905673301986",
        appId: "1:905673301986:web:aad1477b1098d7cbf66380"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- SECTOR MANAGEMENT LOGIC ---
    
    // 1. కొత్త సెక్టార్ ని యాడ్ చేయడం
    window.addNewSector = async () => {
        const sName = document.getElementById('newSectorName').value.trim();
        if(!sName) { alert("పేరు ఇవ్వండి!"); return; }
        
        try {
            await addDoc(collection(db, "categories"), {
                name: sName,
                id: sName.replace(/\s+/g, ''), // Space తీసేసి ID లా వాడతాం
                timestamp: serverTimestamp()
            });
            document.getElementById('newSectorName').value = "";
            alert("సెక్టార్ యాడ్ అయ్యింది!");
        } catch(e) { alert("Error: " + e); }
    };

    // 2. సెక్టార్ ని డిలీట్ చేయడం
    window.deleteSector = async (docId) => {
        if(confirm("ఈ సెక్టార్ ని తొలగించాలా? (ఇందులోని ఐటమ్స్ అలాగే ఉంటాయి)")) {
            await deleteDoc(doc(db, "categories", docId));
        }
    };

    // 3. సెక్టార్లను రియల్ టైమ్ లో లోడ్ చేయడం (Tabs & Categories)
    onSnapshot(query(collection(db, "categories"), orderBy("timestamp", "asc")), (snapshot) => {
        const tabs = document.getElementById('tabsContainer');
        const menuArea = document.getElementById('menuDataArea');
        const dropdown = document.getElementById('category');
        const list = document.getElementById('sectorListContainer');

        tabs.innerHTML = "";
        menuArea.innerHTML = "";
        dropdown.innerHTML = "";
        list.innerHTML = "";

        snapshot.forEach((d) => {
            const cat = d.data();
            const docId = d.id;

            // Tabs UI
            tabs.innerHTML += `<a href="#${cat.id}" class="sector-btn">${cat.name}</a>`;

            // Menu Cards UI
            menuArea.innerHTML += `
                <div class="category-card" id="${cat.id}">
                    <h3>${cat.name}</h3>
                    <table id="${cat.id}Table"></table>
                </div>`;

            // Dropdown UI
            dropdown.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;

            // Settings List UI
            list.innerHTML += `
                <div class="sector-list-item">
                    <span>${cat.name}</span>
                    <button class="del-btn" onclick="window.deleteSector('${docId}')">Delete</button>
                </div>`;
        });
        
        // సెక్టార్లు లోడ్ అయిన తర్వాత ఐటమ్స్ ని కూడా రీ-లోడ్ చేయాలి
        loadMenuItems();
    });

    // --- MENU ITEMS LOGIC ---
    function loadMenuItems() {
        onSnapshot(collection(db, "menu_items"), (snapshot) => {
            // అన్ని టేబుల్స్ ని క్లియర్ చేయడం
            const tables = document.querySelectorAll('table[id$="Table"]');
            tables.forEach(t => t.innerHTML = "");

            snapshot.forEach((itemDoc) => {
                const item = itemDoc.data();
                const id = itemDoc.id;
                const table = document.getElementById(item.cat + 'Table');
                if(table) {
                    let row = table.insertRow();
                    row.innerHTML = `
                        <td style="width: 60%;">${item.name}</td>
                        <td style="width: 25%; color:#FFD700; font-weight:bold;">Rs. ${item.price}/-</td>
                        <td><button class="del-btn" onclick="window.deleteItem('${id}')">Delete</button></td>
                    `;
                }
            });
        });
    }

    // --- REST OF THE CODE (Orders/History) ---
    window.updateRightSide = async () => {
        let name = document.getElementById('itemName').value;
        let price = document.getElementById('itemPrice').value;
        let cat = document.getElementById('category').value;
        if(name && price) {
            await addDoc(collection(db, "menu_items"), { name, price: Number(price), cat });
            document.getElementById('itemName').value = "";
            document.getElementById('itemPrice').value = "";
        }
    };

    window.deleteItem = async (id) => {
        if(confirm("Delete this item?")) await deleteDoc(doc(db, "menu_items", id));
    };

    // Live Orders & History (పాత కోడ్ అలాగే ఉంటుంది)
    onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), (snapshot) => {
        const list = document.getElementById('order-display-list');
        list.innerHTML = snapshot.empty ? '<p style="text-align:center; color:#888;">No orders.</p>' : "";
        snapshot.forEach(d => {
            const ord = d.data();
            list.innerHTML += `
                <div class="live-order-card">
                    <button onclick="window.clearLiveOrder('${d.id}')" style="float:right; background:#ff4444; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">X</button>
                    <b style="color:#FFD700;">Customer: ${ord.customer}</b> <span class="table-badge">Table: ${ord.table}</span><br>
                    <div style="font-size:13px; margin:5px 0;">${ord.items}</div>
                    <span style="color:#25D366;"><b>Total: ₹${ord.total}</b></span>
                    <span class="order-time">⏰ Received: ${ord.time}</span>
                </div>`;
        });
    });

    window.clearLiveOrder = async (id) => { if(confirm("Clear this order?")) await deleteDoc(doc(db, "orders", id)); };
    
    window.showHistory = async (type) => {
        document.getElementById('mainOptions').style.display = 'none';
        document.getElementById('historyResult').style.display = 'block';
        const content = document.getElementById('historyContent');
        const snap = await getDocs(collection(db, "orders"));
        let total = 0;
        let htm = `<table style="font-size:11px;"><tr><th>Time</th><th>Total</th></tr>`;
        snap.forEach(d => {
            const data = d.data();
            if(type === 'all' || data.table == type) {
                htm += `<tr><td>${data.time}</td><td>₹${data.total}</td></tr>`;
                total += Number(data.total);
            }
        });
        content.innerHTML = htm + `</table><h4 style="color:#25D366;">Total: ₹${total}</h4>`;
    };

</script>

<script>
    function openSettings() { document.getElementById('settingsModal').style.display = 'block'; backToSettings(); }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function backToSettings() {
        document.getElementById('mainOptions').style.display = 'block';
        document.getElementById('tablesGrid').style.display = 'none';
        document.getElementById('historyResult').style.display = 'none';
        document.getElementById('sectorManager').style.display = 'none';
        document.getElementById('modalTitle').innerText = "Settings";
    }
    function showSectorManager() {
        document.getElementById('mainOptions').style.display = 'none';
        document.getElementById('sectorManager').style.display = 'block';
        document.getElementById('modalTitle').innerText = "Manage Sectors";
    }
    function showTablesGrid() {
        document.getElementById('mainOptions').style.display = 'none';
        document.getElementById('tablesGrid').style.display = 'block';
        const container = document.getElementById('gridContainer');
        container.innerHTML = "";
        for(let i=1; i<=50; i++) container.innerHTML += `<div class="table-btn" onclick="showHistory(${i})">${i}</div>`;
    }
</script>

</body>
</html>
